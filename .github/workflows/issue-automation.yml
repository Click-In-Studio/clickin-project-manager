name: Issue Automation

on:
  issues:
    types: [opened]

jobs:
  # Use OpenAI to suggest labels, an issue type (Task/Bug/Feature), and an
  # effort estimate (S/M/L/XL) based on the issue's title and description.
  classify-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const issue = context.payload.issue;

            // Labels that need human triage history rather than derivation from title+body.
            const EXCLUDED_LABELS = new Set(['duplicate', 'wontfix', 'invalid']);
            const ISSUE_TYPES = ['Task', 'Bug', 'Feature'];
            const EFFORT_VALUES = ['S', 'M', 'L', 'XL'];
            // S=green  M=yellow  L=light-yellow  XL=red-orange
            const EFFORT_COLORS = { S: '0e8a16', M: 'fbca04', L: 'e4e669', XL: 'd93f0b' };

            const { data: repoLabels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            // Keep effort: labels out of the AI candidate list — they're handled separately.
            const candidateLabels = repoLabels
              .map(l => l.name)
              .filter(name => !EXCLUDED_LABELS.has(name) && !name.startsWith('effort:'));

            if (!process.env.OPENAI_API_KEY) {
              console.log('OPENAI_API_KEY not set, skipping AI classification.');
              return;
            }

            const classifyFunction = {
              name: 'classify_issue',
              description: 'Classify a GitHub issue with labels, an issue type, and an effort estimate.',
              strict: true,
              parameters: {
                type: 'object',
                properties: {
                  labels: {
                    type: 'array',
                    description: 'Zero or more labels from the allowed list that clearly apply. Leave empty if none clearly apply — do not guess.',
                    items: { type: 'string', enum: candidateLabels.length ? candidateLabels : [''] },
                  },
                  type: {
                    type: 'string',
                    description: 'The single most appropriate issue type.',
                    enum: ISSUE_TYPES,
                  },
                  effort: {
                    type: 'string',
                    description: 'Estimated implementation effort. S = a few hours, M = 1–2 days, L = up to a week, XL = more than a week.',
                    enum: EFFORT_VALUES,
                  },
                },
                required: ['labels', 'type', 'effort'],
                additionalProperties: false,
              },
            };

            const body = issue.body ? issue.body.slice(0, 8000) : '(no description)';
            const userMessage = `Title: ${issue.title}\n\nBody:\n${body}`;

            let response;
            try {
              response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'content-type': 'application/json',
                  'authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                },
                body: JSON.stringify({
                  model: 'gpt-4.1-mini',
                  messages: [
                    { role: 'system', content: 'You triage GitHub issues for a software project. Classify the issue using the classify_issue tool. Only pick labels that are clearly and directly supported by the title/body — when unsure, leave labels empty rather than guessing.' },
                    { role: 'user', content: userMessage },
                  ],
                  tools: [{ type: 'function', function: classifyFunction }],
                  tool_choice: { type: 'function', function: { name: 'classify_issue' } },
                }),
              });
            } catch (err) {
              console.log(`OpenAI API request failed: ${err.message}`);
              return;
            }

            if (!response.ok) {
              console.log(`OpenAI API returned ${response.status}: ${await response.text()}`);
              return;
            }

            const result = await response.json();
            const toolCall = (result.choices?.[0]?.message?.tool_calls || []).find(c => c.function?.name === 'classify_issue');
            if (!toolCall) {
              console.log('No classify_issue tool call in response, skipping.');
              return;
            }

            let input;
            try {
              input = JSON.parse(toolCall.function.arguments);
            } catch (err) {
              console.log(`Failed to parse tool call arguments: ${err.message}`);
              return;
            }

            const candidateSet = new Set(candidateLabels);
            const labels = (input.labels || []).filter(l => candidateSet.has(l));

            // Effort label: ensure it exists in the repo, then queue it for application.
            const effort = EFFORT_VALUES.includes(input.effort) ? input.effort : null;
            if (effort) {
              const effortLabel = `effort:${effort}`;
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: effortLabel,
                  color: EFFORT_COLORS[effort],
                });
              } catch (_) {
                // Label already exists — ignore.
              }
              labels.push(effortLabel);
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels,
              });
            }

            const type = ISSUE_TYPES.includes(input.type) ? input.type : null;
            if (type) {
              try {
                await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  type,
                });
              } catch (err) {
                console.log(`Failed to set issue type: ${err.message}`);
              }
            }

            console.log(`Applied labels: ${labels.join(', ') || '(none)'}; type: ${type || '(none)'}; effort: ${effort || '(none)'}`);
